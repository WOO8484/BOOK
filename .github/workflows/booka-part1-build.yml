name: BOOKA PART1 Build Verification

on:
  push:
    branches: [ "main", "part1" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설치 (지시서 3.4 고정값)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK 설치
        uses: android-actions/setup-android@v3

      - name: 산출물 디렉터리 준비
        run: mkdir -p artifacts/test-results artifacts/lint-results

      # gradle-wrapper.jar는 이 워크플로가 만들지 않는다. bootstrap-wrapper.yml을 먼저
      # 1회 실행해 공식 Gradle Wrapper 바이너리를 저장소에 커밋해 두어야 한다.
      # 여기서는 그 존재만 확인하고, 있으면 처음부터 끝까지 ./gradlew만 사용한다.
      - name: gradle-wrapper.jar 존재 확인 (없으면 즉시 실패 + 안내)
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "오류: gradle/wrapper/gradle-wrapper.jar 가 저장소에 없습니다." >&2
            echo "이 워크플로는 wrapper를 대신 생성하지 않습니다." >&2
            echo ".github/workflows/bootstrap-wrapper.yml 을 GitHub Actions 탭에서" >&2
            echo "먼저 1회 수동 실행(workflow_dispatch)해 공식 바이너리를 커밋하세요." >&2
            exit 1
          fi
          ls -l gradle/wrapper/gradle-wrapper.jar

      - name: gradlew 실행 권한 확인/부여
        run: |
          chmod +x ./gradlew
          ls -l gradlew
          test -x ./gradlew

      # 지시서 13 공통 빌드 명령을 지시서 순서(clean → test → lint → assembleDebug) 그대로,
      # 각각 별도 단계로 실행하고 원본 로그를 보존한다(캐시 삭제만으로 원인을 숨기지 않음).
      - name: ./gradlew clean
        run: ./gradlew clean 2>&1 | tee artifacts/01_clean.log

      - name: ./gradlew test
        run: ./gradlew test 2>&1 | tee artifacts/02_test.log

      - name: ./gradlew lint
        run: ./gradlew lint 2>&1 | tee artifacts/03_lint.log

      - name: ./gradlew assembleDebug
        run: ./gradlew assembleDebug 2>&1 | tee artifacts/04_assembleDebug.log

      - name: 실행 명령/버전 정보 기록
        if: always()
        run: |
          {
            echo "실행 명령: ./gradlew clean / test / lint / assembleDebug"
            echo "시작~종료 시각(UTC): 워크플로 로그의 각 스텝 타임스탬프 참조"
            echo "Gradle: $(./gradlew --version | grep 'Gradle ' || true)"
            echo "AGP/Kotlin/JDK: gradle/libs.versions.toml 및 actions/setup-java 로그 참조"
            java -version
          } | tee artifacts/00_environment.log

      - name: APK를 BOOKA_PART1-debug.apk로 복사
        run: |
          SRC="app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "$SRC" ]; then
            echo "오류: $SRC 를 찾을 수 없습니다. assembleDebug 산출 경로가 예상과 다릅니다." >&2
            find . -name "*.apk" -path "*/outputs/apk/*" >&2 || true
            exit 1
          fi
          cp "$SRC" artifacts/BOOKA_PART1-debug.apk
          echo "APK 크기: $(stat -c%s artifacts/BOOKA_PART1-debug.apk) bytes"

      - name: test 결과 수집
        if: always()
        run: |
          find . -type d -path "*/build/test-results/*" -exec cp -r --parents {} artifacts/test-results/ \; 2>/dev/null || true
          find . -type d -path "*/build/reports/tests/*" -exec cp -r --parents {} artifacts/test-results/ \; 2>/dev/null || true

      - name: lint 결과 수집
        if: always()
        run: |
          find . -type f -name "lint-results*.html" -exec cp --parents {} artifacts/lint-results/ \; 2>/dev/null || true
          find . -type f -name "lint-results*.xml" -exec cp --parents {} artifacts/lint-results/ \; 2>/dev/null || true
          find . -type f -name "lint-results*.sarif" -exec cp --parents {} artifacts/lint-results/ \; 2>/dev/null || true

      - name: 최종 소스 ZIP 생성 (BOOKA_Android_PART1.zip)
        run: |
          zip -r artifacts/BOOKA_Android_PART1.zip . \
            -x "artifacts/*" -x ".git/*" -x "**/build/*" -x "**/.gradle/*" -x "*.DS_Store"

      - name: SHA-256 계산 (APK + 최종 ZIP)
        run: |
          {
            echo "# BOOKA_PART1_SHA256SUMS.txt"
            echo "# GitHub Actions에서 실제 assembleDebug로 생성한 APK와, 이 실행에서 만든 최종 소스 ZIP의 체크섬."
            ( cd artifacts && sha256sum BOOKA_PART1-debug.apk )
            ( cd artifacts && sha256sum BOOKA_Android_PART1.zip )
          } | tee artifacts/BOOKA_PART1_SHA256SUMS.txt

      - name: 전체 빌드 로그 묶기 (BOOKA_PART1_build_logs.zip)
        if: always()
        run: |
          cd artifacts
          zip -r BOOKA_PART1_build_logs.zip \
            00_environment.log 01_clean.log 02_test.log 03_lint.log 04_assembleDebug.log \
            test-results lint-results 2>/dev/null || true

      - name: Artifact 업로드 - APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BOOKA_PART1-debug-apk
          path: artifacts/BOOKA_PART1-debug.apk
          if-no-files-found: warn

      - name: Artifact 업로드 - 전체 빌드 로그
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BOOKA_PART1_build_logs
          path: artifacts/BOOKA_PART1_build_logs.zip
          if-no-files-found: warn

      - name: Artifact 업로드 - test 결과
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BOOKA_PART1_test_results
          path: artifacts/test-results
          if-no-files-found: warn

      - name: Artifact 업로드 - lint 결과
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BOOKA_PART1_lint_results
          path: artifacts/lint-results
          if-no-files-found: warn

      - name: Artifact 업로드 - SHA256SUMS
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BOOKA_PART1_SHA256SUMS
          path: artifacts/BOOKA_PART1_SHA256SUMS.txt
          if-no-files-found: warn

      - name: Artifact 업로드 - 최종 소스 ZIP
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BOOKA_Android_PART1_source
          path: artifacts/BOOKA_Android_PART1.zip
          if-no-files-found: warn
