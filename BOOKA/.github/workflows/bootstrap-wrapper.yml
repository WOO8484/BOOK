name: Bootstrap Official Gradle Wrapper (1회성)

# 이 워크플로는 딱 한 번만 수동 실행하면 된다(workflow_dispatch).
# Claude 작업 환경에는 네트워크와 JDK(javac)가 없어 공식 gradle-wrapper.jar 바이너리를
# 직접 만들 수 없었다. 이 워크플로는 GitHub Actions 러너(네트워크·JDK·gradle CLI 보유)에서
# 공식 `gradle wrapper` 명령으로 진짜 바이너리를 생성해 저장소에 커밋한다.
# 이 워크플로가 성공적으로 실행·커밋된 뒤에는 booka-part1-build.yml이
# 어떤 wrapper 생성 과정도 거치지 않고 바로 ./gradlew를 사용한다.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설치
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 공식 Gradle Wrapper 9.4.1 생성 (gradle CLI, 최초 1회만)
        run: gradle wrapper --gradle-version 9.4.1 --distribution-type bin

      - name: 실행 권한 부여
        run: chmod +x gradlew

      - name: 생성 결과 확인
        run: |
          test -f gradlew
          test -f gradlew.bat
          test -f gradle/wrapper/gradle-wrapper.jar
          test -f gradle/wrapper/gradle-wrapper.properties
          ls -l gradlew gradle/wrapper/

      - name: 변경사항 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradlew gradlew.bat gradle/wrapper/gradle-wrapper.jar gradle/wrapper/gradle-wrapper.properties
          if git diff --cached --quiet; then
            echo "변경사항 없음 (이미 공식 wrapper가 커밋되어 있음)"
          else
            git commit -m "chore: 공식 Gradle Wrapper 9.4.1 바이너리 커밋 (bootstrap 1회성 실행)"
            git push
          fi
